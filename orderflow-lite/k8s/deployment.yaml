apiVersion: apps/v1
kind: Deployment
metadata:
  name: orderflow-lite
  labels:
    app: orderflow-lite
spec:
  replicas: 4
  selector:
    matchLabels:
      app: orderflow-lite
  template:
    metadata:
      labels:
        app: orderflow-lite
    spec:
      containers:
        - name: orderflow-lite
          # Defaults to the local registry image — confirmed working
          # end-to-end with Docker Desktop's built-in Kubernetes, no
          # separate "load the image into the cluster" step needed (see
          # content/local-registry-setup.md for the full setup and why).
          # On kind/Minikube instead, see k8s/README.md for the
          # `kind load docker-image` / `minikube image load` equivalents.
          image: ram1uj/orderflow-lite:latest
          # Always (not IfNotPresent): this points at a mutable :latest
          # tag in a local registry you'll keep re-pushing to while
          # iterating — without this, the node would happily keep serving
          # whatever it cached on the first pull. Per-build-tagged images
          # (e.g. what the Jenkinsfiles push) don't need this, since each
          # tag is only ever pushed once.
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: orderflow-config
            - secretRef:
                name: orderflow-secret
          # Liveness: process is up and can respond at all. Does not depend
          # on MySQL, matching src/app.js's /health handler — a DB outage
          # should not cause Kubernetes to kill and restart every replica.
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          # Readiness: only receive traffic once /ready confirms a working
          # DB connection — matters most right after a fresh rollout, before
          # MySQL has necessarily finished its own startup.
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          # Sized for a laptop-scale local cluster (Docker Desktop,
          # kind, or Minikube) running two replicas of a small Express
          # app, not for production traffic.
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
