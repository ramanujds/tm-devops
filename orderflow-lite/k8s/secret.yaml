# ---------------------------------------------------------------------------
# PLACEHOLDER VALUES ONLY. This file is checked into git for the training
# course so `kubectl apply -f k8s/` works out of the box on a local
# kind/Minikube cluster. Do not reuse these values anywhere else.
#
# Real deployments must generate a fresh Secret per environment (e.g. via
# `kubectl create secret generic ... --dry-run=client -o yaml`, a secrets
# manager + External Secrets Operator, sealed-secrets, or similar) and MUST
# NEVER commit the real, decoded values to source control.
#
# `data` values below are base64-*encoding* only — not encryption. Anyone
# with `kubectl get secret -o yaml` access (or read access to this file) can
# trivially decode them, e.g.:
#   echo "Y2hhbmdlbWU=" | base64 -d
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: orderflow-secret
  labels:
    app: orderflow-lite
type: Opaque
data:
  # base64("changeme") — used as DB_PASSWORD (app) and MYSQL_PASSWORD (db)
  DB_PASSWORD: Y2hhbmdlbWU=
  # base64("changeme-api-key") — required x-api-key header value for /orders*
  API_KEY: Y2hhbmdlbWUtYXBpLWtleQ==
  # base64("changeme-root-password") — only consumed by the MySQL container
  # itself for its root bootstrap; the app never uses this credential.
  MYSQL_ROOT_PASSWORD: Y2hhbmdlbWUtcm9vdC1wYXNzd29yZA==
